# Simple tmux config: reliable, transparent, no TPM plugins.
# Vim/tmux pane navigation: christoomey/vim-tmux-navigator (snippet below).

set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

set -g mouse on
set -g history-limit 50000
set -g focus-events on

setw -g mode-keys vi
set -g status-keys vi

# Status bar: bg=default keeps Alacritty transparency visible.
set -g status-position bottom
set -g status-interval 5
set -g status-justify centre
set -g status-style "fg=colour252,bg=default"

setw -g window-status-style "fg=colour245,bg=default"
setw -g window-status-current-style "fg=colour14,bold,bg=default"
setw -g window-status-format " #I·#W#{?window_flags,#{window_flags},} "
setw -g window-status-current-format " #I·#W#{?window_flags,#{window_flags},} "

set -g pane-border-style "fg=colour238,bg=default"
set -g pane-active-border-style "fg=colour14,bg=default"
set -g message-style "fg=colour255,bg=default"
set -g mode-style "fg=colour232,bg=colour14"

set -g status-left-length 70
set -g status-left "#[fg=colour6,bold]#{?client_prefix,● ,#[fg=colour238]· }#[fg=colour14]#S#[fg=colour245] │ #[fg=colour248]#(whoami)@#h "

set -g status-right-length 90
set -g status-right "#[fg=colour245]#{?pane_synchronized,SYNC · ,}#[fg=colour248]%Y-%m-%d #[fg=colour14,bold]%H:%M#[default] · #[fg=colour245]#{=64:pane_current_path}"

# Smart pane switching with awareness of Vim/Neovim splits.
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# New panes and windows start in the current pane directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
