# Ranger — минимальный конфиг (dotnetsh)
# Установка: stow -t ~/.config config  (из корня репо)

set preview_common_directories true
set preview_directories true
set preview_files true
set preview_max_size 0
set show_hidden false
set vcs_aware true
set sort natural
set confirm_on_delete multiple
set draw_borders both
set status_bar_on_top false
set line_numbers false

set editor nvim
set pager less
set indent_letter false
set flushinput true
set cd_tab_tab false
set cd_bookmarks true

# Подсветка в духе Nord (Alacritty)
set colorscheme default
set active_highlight_color  blue
set highlight_color  cyan
set directory  cyan
set title_color  green
set in_progress_color  yellow
set error_color  red
set tab_title_color  blue
set tagged_color  magenta

# fzf: рекурсивный поиск файлов/папок в текущем дереве
map <C-f> fzf_select
# с префиксом (например 2<C-f>) — только директории
map gf fzf_select

# Открыть терминал в текущей папке
map ` shell $SHELL

# Yank путь в clipboard (WSL: wl-copy / xclip если есть)
map yp yank path
map yt yank terminal

# Быстрый переход домой / вверх
map gh cd ~
map uu cd ..
