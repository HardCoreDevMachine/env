# rifle — ассоциации файлов (dotnetsh)

# Текст и код → nvim
ext md?,      has nvim,     terminal, flag f = nvim -- "$@"
ext txt?,     has nvim,     terminal, flag f = nvim -- "$@"
ext py?,      has nvim,     terminal, flag f = nvim -- "$@"
ext lua?,     has nvim,     terminal, flag f = nvim -- "$@"
ext sh?,      has nvim,     terminal, flag f = nvim -- "$@"
ext zsh?,     has nvim,     terminal, flag f = nvim -- "$@"
ext json?,    has nvim,     terminal, flag f = nvim -- "$@"
ext ya?ml?,   has nvim,     terminal, flag f = nvim -- "$@"
ext toml?,    has nvim,     terminal, flag f = nvim -- "$@"
ext xml?,     has nvim,     terminal, flag f = nvim -- "$@"
ext html?,    has nvim,     terminal, flag f = nvim -- "$@"
ext css?,     has nvim,     terminal, flag f = nvim -- "$@"
ext js?,      has nvim,     terminal, flag f = nvim -- "$@"
ext ts?,      has nvim,     terminal, flag f = nvim -- "$@"
ext cs?,      has nvim,     terminal, flag f = nvim -- "$@"
ext csproj?,  has nvim,     terminal, flag f = nvim -- "$@"
ext sln?,     has nvim,     terminal, flag f = nvim -- "$@"
ext go?,      has nvim,     terminal, flag f = nvim -- "$@"
ext rs?,      has nvim,     terminal, flag f = nvim -- "$@"
ext conf?,    has nvim,     terminal, flag f = nvim -- "$@"
ext ini?,     has nvim,     terminal, flag f = nvim -- "$@"
ext log?,     has nvim,     terminal, flag f = nvim -- "$@"

# Fallback на vim по SSH
ext md?,      has vim,      terminal, flag f = vim -- "$@"
ext py?,      has vim,      terminal, flag f = vim -- "$@"
ext cs?,      has vim,      terminal, flag f = vim -- "$@"

# Архивы
ext tar?,     has atool,    terminal = atool --list --each -- "$@"
ext zip?,     has unzip,    terminal = unzip -l "$1"
ext 7z?,      has 7z,       terminal = 7z l -p "$1"

# Медиа и прочее
ext jpg?,     has feh,      X, flag f = feh -- "$@"
ext png?,     has feh,      X, flag f = feh -- "$@"
ext pdf?,     has evince,   X, flag f = evince -- "$@"
mime ^video/, has mpv,      X, flag f = mpv -- "$@"

# Директории
type directory = cd "$1"

# Последний шанс
ext *,        flag f = xdg-open "$@"
